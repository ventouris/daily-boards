services:
  frontend:
    build:
      context: .
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_WATCH_USE_POLLING: "true"
    ports:
      - "5173:5173"
    restart: unless-stopped
    volumes:
      - .:/app
      - frontend-node-modules:/app/node_modules

volumes:
  frontend-node-modules:
